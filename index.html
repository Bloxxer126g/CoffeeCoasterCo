<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://api.fontshare.com/v2/css?f[]=plein@1&display=swap" rel="stylesheet"> 

    <link href="styles.css" rel="stylesheet">
    <script src="main.js" defer></script>

    <title>Lorem ipsum dolor sit amet</title>
</head>
<body>
    <div id="Topbar">
        <p id="Title">Lorem ipsum dolor sit amet</p>
        <button class="TopbarNavigator" id="CheckoutButton">
            Checkout
        </button>
        <button class="TopbarNavigator" id="IpsumButton">
            Cart
        </button>
    </div>
    <div id="CenterContent">
        <p id="CenterTitle">Lorem ipsum dolor sit amet</p>
        <div class="ItemDisplay" id="LoremItem">
            <img class="ItemImage" src="images/LoremItem.png">
            <div class="item-overlay" aria-hidden="true">
                <div class="overlay-inner">
                    <span class="product-name">LoremItem - £3.00</span>
                    <button class="add-btn" aria-label="Add Blue Trainers to cart" amount="3">Add to cart</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
